<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kripto Tarayıcı</title>
  <style>
    :root {
      --bg: #0d1117;
      --card: #161b22;
      --border: #21262d;
      --text: #e6edf3;
      --muted: #8b949e;
      --green: #3fb950;
      --green-bg: #1a2e1a;
      --yellow: #d29922;
      --yellow-bg: #2d2300;
      --red: #f85149;
      --red-bg: #2d1010;
      --blue: #58a6ff;
      --accent: #238636;
      --radius: 10px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 18px;
      font-weight: 700;
    }

    .logo .pulse {
      width: 10px; height: 10px;
      background: var(--green);
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); box-shadow: 0 0 0 0 rgba(63,185,80,.4); }
      50% { opacity: .8; transform: scale(1.1); box-shadow: 0 0 0 6px rgba(63,185,80,0); }
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .timer-box {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 8px 16px;
      text-align: center;
    }

    .timer-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
    .timer-value { font-size: 20px; font-weight: 700; color: var(--blue); font-variant-numeric: tabular-nums; }

    .btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      padding: 9px 18px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .2s;
    }
    .btn:hover { opacity: .85; }
    .btn:disabled { opacity: .4; cursor: not-allowed; }

    .btn-outline {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
    }

    /* ── Status bar ── */
    .status-bar {
      padding: 10px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 12px;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }

    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--muted);
    }
    .status-dot.scanning { background: var(--yellow); animation: pulse 1s infinite; }
    .status-dot.done { background: var(--green); }
    .status-dot.error { background: var(--red); }

    /* ── Summary cards ── */
    .summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
      padding: 20px 24px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
    }

    .card-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 8px; }
    .card-value { font-size: 28px; font-weight: 700; }
    .card-value.green { color: var(--green); }
    .card-value.yellow { color: var(--yellow); }
    .card-value.red { color: var(--red); }
    .card-value.blue { color: var(--blue); }

    /* ── Section ── */
    .section { padding: 0 24px 24px; }
    .section-title {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* ── Table ── */
    .table-wrap {
      overflow-x: auto;
      border-radius: var(--radius);
      border: 1px solid var(--border);
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead th {
      background: #1c2128;
      padding: 10px 14px;
      text-align: left;
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .5px;
      white-space: nowrap;
    }

    tbody tr {
      border-top: 1px solid var(--border);
      transition: background .15s;
    }
    tbody tr:hover { background: #1c2128; }

    td {
      padding: 10px 14px;
      white-space: nowrap;
      vertical-align: middle;
    }

    .coin-name {
      font-weight: 700;
      font-size: 15px;
      color: var(--text);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 9px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
    }
    .badge.pass { background: var(--green-bg); color: var(--green); }
    .badge.fail { background: var(--red-bg); color: var(--red); }
    .badge.warn { background: var(--yellow-bg); color: var(--yellow); }
    .badge.neutral { background: #1c2128; color: var(--muted); }

    .score-bar {
      display: flex;
      gap: 3px;
      align-items: center;
    }
    .score-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--border);
    }
    .score-dot.filled { background: var(--green); }

    .reasons { font-size: 11px; color: var(--muted); max-width: 220px; white-space: normal; line-height: 1.4; }

    /* ── Notification bell ── */
    .notif-btn {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: var(--radius);
      padding: 8px 12px;
      cursor: pointer;
      font-size: 16px;
      transition: border-color .2s;
    }
    .notif-btn.active { border-color: var(--green); color: var(--green); }

    /* ── Loader ── */
    .loader {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 60px;
      color: var(--muted);
    }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Last scan ── */
    .last-scan { font-size: 12px; color: var(--muted); }

    /* ── Notification toast ── */
    #toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--card);
      border: 1px solid var(--green);
      border-radius: var(--radius);
      padding: 14px 18px;
      max-width: 320px;
      z-index: 9999;
      display: none;
      animation: slideIn .3s ease;
    }
    @keyframes slideIn {
      from { transform: translateY(20px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }
    .toast-title { font-weight: 700; color: var(--green); margin-bottom: 4px; }
    .toast-body  { font-size: 12px; color: var(--muted); }

    @media (max-width: 600px) {
      header { padding: 12px 16px; }
      .summary { padding: 12px 16px; }
      .section { padding: 0 16px 16px; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="pulse"></div>
    Kripto Tarayıcı
  </div>
  <div class="header-right">
    <div class="timer-box">
      <div class="timer-label">Sonraki Tarama</div>
      <div class="timer-value" id="countdown">--:--</div>
    </div>
    <button class="notif-btn" id="notifBtn" onclick="toggleNotifications()" title="Bildirimler">🔔</button>
    <button class="btn" id="scanBtn" onclick="forceScan()">Şimdi Tara</button>
  </div>
</header>

<div class="status-bar">
  <div class="status-dot" id="statusDot"></div>
  <span id="statusText">Bağlanılıyor...</span>
  <span>|</span>
  <span id="lastScanText" class="last-scan">—</span>
  <span>|</span>
  <span id="coinCount" class="last-scan">0 coin tarandı</span>
</div>

<div class="summary">
  <div class="card">
    <div class="card-label">Tarama Listesi</div>
    <div class="card-value blue" id="totalCoins">—</div>
  </div>
  <div class="card">
    <div class="card-label">3/3 Kriter (AL)</div>
    <div class="card-value green" id="passCount">—</div>
  </div>
  <div class="card">
    <div class="card-label">2/3 Kriter (İzle)</div>
    <div class="card-value yellow" id="watchCount">—</div>
  </div>
  <div class="card">
    <div class="card-label">Elenenler</div>
    <div class="card-value red" id="failCount">—</div>
  </div>
</div>

<div class="section" id="mainContent">
  <div class="loader" id="loader">
    <div class="spinner"></div>
    <div>İlk tarama yapılıyor, lütfen bekleyin (~2 dakika)...</div>
  </div>
</div>

<div id="toast">
  <div class="toast-title" id="toastTitle"></div>
  <div class="toast-body"  id="toastBody"></div>
</div>

<script>
  let notificationsEnabled = false;
  let lastPassCount = -1;
  let nextScanTs = null;

  // ── Notification permission ────────────────────────────────
  async function toggleNotifications() {
    if (notificationsEnabled) {
      notificationsEnabled = false;
      document.getElementById('notifBtn').classList.remove('active');
      showToast('Bildirimler kapatıldı', '15 dk tarama bildirimleri devre dışı.');
      return;
    }
    if (!('Notification' in window)) {
      showToast('Desteklenmiyor', 'Tarayıcınız bildirim desteklemiyor.');
      return;
    }
    const perm = await Notification.requestPermission();
    if (perm === 'granted') {
      notificationsEnabled = true;
      document.getElementById('notifBtn').classList.add('active');
      showToast('Bildirimler Açık!', 'Her 15 dakikada sinyal bulunursa uyarılacaksınız.');
    } else {
      showToast('İzin Reddedildi', 'Tarayıcı ayarlarından izin verin.');
    }
  }

  function sendNotification(title, body) {
    if (notificationsEnabled && Notification.permission === 'granted') {
      new Notification(title, { body, icon: '' });
    }
  }

  // ── Toast ──────────────────────────────────────────────────
  function showToast(title, body, duration = 4000) {
    document.getElementById('toastTitle').textContent = title;
    document.getElementById('toastBody').textContent  = body;
    const t = document.getElementById('toast');
    t.style.display = 'block';
    clearTimeout(t._timer);
    t._timer = setTimeout(() => t.style.display = 'none', duration);
  }

  // ── Countdown ─────────────────────────────────────────────
  function updateCountdown() {
    if (!nextScanTs) return;
    const diff = Math.max(0, Math.floor(nextScanTs - Date.now() / 1000));
    const m = String(Math.floor(diff / 60)).padStart(2, '0');
    const s = String(diff % 60).padStart(2, '0');
    document.getElementById('countdown').textContent = `${m}:${s}`;
  }
  setInterval(updateCountdown, 1000);

  // ── Force scan ────────────────────────────────────────────
  async function forceScan() {
    const btn = document.getElementById('scanBtn');
    btn.disabled = true;
    btn.textContent = 'Taranıyor...';
    try {
      await fetch('/api/scan/force', { method: 'POST' });
      showToast('Tarama Başladı', '~2 dakika sürebilir. Sonuçlar otomatik güncellenecek.');
    } catch(e) {
      showToast('Hata', 'Sunucuya bağlanılamadı.');
    }
    setTimeout(() => { btn.disabled = false; btn.textContent = 'Şimdi Tara'; }, 10000);
  }

  // ── Render ────────────────────────────────────────────────
  function badge(ok, label) {
    if (ok === true)    return `<span class="badge pass">✓ ${label}</span>`;
    if (ok === false)   return `<span class="badge fail">✗ ${label}</span>`;
    return `<span class="badge neutral">${label}</span>`;
  }

  function utBadge(sig) {
    if (sig === 'BUY')      return `<span class="badge pass">BUY</span>`;
    if (sig === 'SELL')     return `<span class="badge fail">SELL</span>`;
    if (sig === 'NO_DATA')  return `<span class="badge neutral">N/A</span>`;
    return `<span class="badge warn">NEUTRAL</span>`;
  }

  function scoreBar(score) {
    return Array.from({length: 3}, (_, i) =>
      `<div class="score-dot ${i < score ? 'filled' : ''}"></div>`
    ).join('');
  }

  function renderTable(rows, showReasons) {
    if (!rows.length) return '<p style="color:var(--muted);padding:20px">Bu kategoride coin yok.</p>';
    return `
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Coin</th>
              <th>Fiyat</th>
              <th>SMA20</th>
              <th>MACD</th>
              <th>UT Bot 2H</th>
              <th>Skor</th>
              ${showReasons ? '<th>Eksik</th>' : '<th>UT Stop</th>'}
            </tr>
          </thead>
          <tbody>
            ${rows.map((r, i) => `
              <tr>
                <td style="color:var(--muted)">${i+1}</td>
                <td><span class="coin-name">${r.coin}</span></td>
                <td><b>${r.price_fmt || '—'}</b></td>
                <td>${badge(r.above_sma, r.sma20_fmt || '—')}</td>
                <td>${badge(r.macd_crossover, r.macd_bullish ? 'Bullish' : 'Bearish')}</td>
                <td>${utBadge(r.ut_signal)}</td>
                <td><div class="score-bar">${scoreBar(r.score)}</div></td>
                ${showReasons
                  ? `<td><div class="reasons">${(r.reasons||[]).join('<br>')}</div></td>`
                  : `<td style="color:var(--muted);font-size:12px">${r.ut_stop_fmt || '—'}</td>`
                }
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>`;
  }

  function render(data) {
    const results = data.results || [];
    const total = results.filter(r => !r.error).length;
    const pass  = results.filter(r => r.score === 3);
    const watch = results.filter(r => r.score === 2);
    const rest  = results.filter(r => r.score <= 1);

    document.getElementById('totalCoins').textContent = results.length;
    document.getElementById('passCount').textContent  = pass.length;
    document.getElementById('watchCount').textContent = watch.length;
    document.getElementById('failCount').textContent  = rest.length;
    document.getElementById('coinCount').textContent  = `${total} coin tarandı`;

    // Status
    const dot  = document.getElementById('statusDot');
    const stxt = document.getElementById('statusText');
    const status = data.status || 'idle';
    dot.className = 'status-dot ' + (status === 'scanning' ? 'scanning' : status === 'done' ? 'done' : '');
    stxt.textContent = status === 'scanning' ? 'Taranıyor...' :
                       status === 'done'     ? 'Tarama tamamlandı' : status;

    if (data.last_scan) {
      const d = new Date(data.last_scan * 1000);
      document.getElementById('lastScanText').textContent =
        'Son tarama: ' + d.toLocaleTimeString('tr-TR');
    }
    if (data.next_scan) {
      nextScanTs = data.next_scan;
    }

    // Notification on new signals
    if (lastPassCount >= 0 && pass.length > lastPassCount) {
      const newOnes = pass.slice(0, pass.length - lastPassCount).map(r => r.coin).join(', ');
      sendNotification('Yeni AL Sinyali!', `${newOnes} — 3/3 kriter karşılandı!`);
      showToast('Yeni AL Sinyali!', `${newOnes} tüm kriterleri geçti!`, 8000);
    }
    lastPassCount = pass.length;

    const content = document.getElementById('mainContent');
    content.innerHTML = `
      <div class="section-title" style="margin-bottom:20px">
        <span style="font-size:18px">✅</span> 3/3 Kriter — AL Sinyali
      </div>
      ${pass.length === 0
        ? `<div class="card" style="margin-bottom:20px;padding:20px;text-align:center;color:var(--muted)">
             Şu an 3/3 kriteri karşılayan coin yok. Piyasa yatay/düşüş eğiliminde.
           </div>`
        : renderTable(pass, false)
      }

      <div style="height:28px"></div>

      <div class="section-title">
        <span style="font-size:18px">⚡</span> 2/3 Kriter — İzleme Listesi
        <span style="font-size:12px;font-weight:400;color:var(--muted)">(UT Bot bekleniyor)</span>
      </div>
      ${renderTable(watch, true)}

      <div style="height:28px"></div>

      <div class="section-title">
        <span style="font-size:18px">❌</span> Elenenler
      </div>
      ${renderTable(rest, true)}

      <div style="height:28px;color:var(--muted);font-size:12px;text-align:center;padding:12px">
        ⚠️ Bu analiz yatırım tavsiyesi değildir. Pozisyon başına sermayenin max %1-2'sini riske atın.
      </div>
    `;
  }

  // ── Poll ──────────────────────────────────────────────────
  async function poll() {
    try {
      const res  = await fetch('/api/scan');
      const data = await res.json();

      document.getElementById('loader')?.remove();

      if (data.results) {
        render(data);
      } else {
        // Still scanning
        const dot = document.getElementById('statusDot');
        dot.className = 'status-dot scanning';
        document.getElementById('statusText').textContent = 'İlk tarama devam ediyor...';
      }
    } catch(e) {
      document.getElementById('statusText').textContent = 'Sunucuya bağlanılamıyor';
    }
  }

  poll();
  setInterval(poll, 15000); // poll every 15s for live status
</script>
</body>
</html>
